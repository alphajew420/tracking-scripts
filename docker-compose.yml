services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trackified
      POSTGRES_USER: trackified
      POSTGRES_PASSWORD: trackified
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackified -d trackified"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--stop-writes-on-bgsave-error", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: tracking-scripts-app-lite:latest
    build:
      context: .
      dockerfile: Dockerfile.light
    command: ["npm", "run", "api"]
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgres://trackified:trackified@postgres:5432/trackified
      REDIS_URL: redis://redis:6379
      TRACKING_API_KEYS: ${TRACKING_API_KEYS:-test_dev_key}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3017}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3017}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-dev}
      EMAIL_FROM: ${EMAIL_FROM:-Trackified <no-reply@trackified.dev>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_SCALE: ${STRIPE_PRICE_SCALE:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3017/dashboard/billing?checkout=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3017/dashboard/billing?checkout=cancelled}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-http://localhost:3017/dashboard/billing}
    ports:
      - "8788:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: tracking-scripts-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://trackified:trackified@postgres:5432/trackified
      REDIS_URL: redis://redis:6379
      HEADLESS: "false"
      BROWSER_CHANNEL_FEDEX: ${BROWSER_CHANNEL_FEDEX:-bundled}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      SESSION_MAX_AGE_MS: 3600000
      SESSION_MAX_USES: 250
      PROXY_MODE: ${PROXY_MODE:-}
      PROXY_DEFAULT: ${PROXY_DEFAULT:-}
      PROXY_DEFAULT_USERNAME: ${PROXY_DEFAULT_USERNAME:-}
      PROXY_DEFAULT_USERNAME_TEMPLATE: ${PROXY_DEFAULT_USERNAME_TEMPLATE:-}
      PROXY_DEFAULT_PASSWORD: ${PROXY_DEFAULT_PASSWORD:-}
      PROXY_COUNTRY: ${PROXY_COUNTRY:-us}
      PROXY_SESSION: ${PROXY_SESSION:-}
      PROXY_USPS: ${PROXY_USPS:-}
      PROXY_USPS_USERNAME: ${PROXY_USPS_USERNAME:-}
      PROXY_USPS_USERNAME_TEMPLATE: ${PROXY_USPS_USERNAME_TEMPLATE:-}
      PROXY_USPS_PASSWORD: ${PROXY_USPS_PASSWORD:-}
      PROXY_UPS: ${PROXY_UPS:-}
      PROXY_UPS_USERNAME: ${PROXY_UPS_USERNAME:-}
      PROXY_UPS_USERNAME_TEMPLATE: ${PROXY_UPS_USERNAME_TEMPLATE:-}
      PROXY_UPS_PASSWORD: ${PROXY_UPS_PASSWORD:-}
      PROXY_FEDEX: ${PROXY_FEDEX:-}
      PROXY_FEDEX_USERNAME: ${PROXY_FEDEX_USERNAME:-}
      PROXY_FEDEX_USERNAME_TEMPLATE: ${PROXY_FEDEX_USERNAME_TEMPLATE:-}
      PROXY_FEDEX_PASSWORD: ${PROXY_FEDEX_PASSWORD:-}
      PROXY_FEDEX_MODE: ${PROXY_FEDEX_MODE:-extension}
      FEDEX_DISABLE_BLOCKING: ${FEDEX_DISABLE_BLOCKING:-true}
      FEDEX_USE_PROXY: ${FEDEX_USE_PROXY:-false}
      FEDEX_TRACK_SURFACE: ${FEDEX_TRACK_SURFACE:-landing}
      FEDEX_BROWSER_FETCH_TIMEOUT_MS: ${FEDEX_BROWSER_FETCH_TIMEOUT_MS:-12000}
      BROWSER_CDP_AUTOLAUNCH_FEDEX: ${BROWSER_CDP_AUTOLAUNCH_FEDEX:-true}
      FEDEX_PROFILE_DIR: ${FEDEX_PROFILE_DIR:-/tmp/trackified-fedex-profile}
      FEDEX_WARM_TIMEOUT_MS: ${FEDEX_WARM_TIMEOUT_MS:-180000}
      FEDEX_READY_TIMEOUT_MS: ${FEDEX_READY_TIMEOUT_MS:-45000}
    volumes:
      - browser-profiles:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    image: tracking-scripts-app-lite:latest
    build:
      context: .
      dockerfile: Dockerfile.light
    command: ["npm", "run", "scheduler"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://trackified:trackified@postgres:5432/trackified
      REDIS_URL: redis://redis:6379
      SCHEDULER_INTERVAL_MS: 60000
      SCHEDULER_BATCH_SIZE: 100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  webhook-worker:
    image: tracking-scripts-app-lite:latest
    build:
      context: .
      dockerfile: Dockerfile.light
    command: ["npm", "run", "webhook-worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://trackified:trackified@postgres:5432/trackified
      REDIS_URL: redis://redis:6379
      WEBHOOK_WORKER_CONCURRENCY: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: tracking-scripts-app-lite:latest
    build:
      context: .
      dockerfile: Dockerfile.light
    command: ["npm", "run", "start", "--", "-p", "3000"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8788
      API_INTERNAL_BASE_URL: http://api:8787
    ports:
      - "3017:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  browser-profiles:
